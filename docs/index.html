<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App Opener and Timer</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f6f8;
      color: #1c2430;
    }
    main {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 10px 40px rgba(20, 40, 60, 0.10);
    }
    h1 { margin: 0 0 .25rem; font-size: 1.6rem; }
    p.tag { margin: 0 0 1.5rem; color: #5b6b7c; }
    ul { list-style: none; margin: 0; padding: 0; }
    li { margin: 0 0 .75rem; }
    a.card {
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: .9rem 1.1rem;
      transition: border-color .15s, transform .15s;
    }
    a.card:hover { border-color: #5b45d6; transform: translateY(-1px); }
    a.card strong { display: block; color: #5b45d6; }
    a.card span { color: #5b6b7c; font-size: .9rem; }
    footer { margin-top: 1.5rem; font-size: .85rem; color: #8494a4; }
    footer a { color: #5b45d6; }
    @media (prefers-color-scheme: dark) {
      body { background: #10151c; color: #e6ebf1; }
      main { background: #1a2029; box-shadow: 0 10px 40px rgba(0,0,0,.4); }
      a.card { border-color: #2b3543; }
      p.tag, a.card span, footer { color: #93a2b3; }
    }
  </style>
</head>
<body>
  <main>
    <h1>App Opener and Timer</h1>
    <p class="tag">Open a checklist of apps on a timer and see how long each one stays open.</p>
    <ul>
      <li>
        <a class="card" href="privacy-policy.html">
          <strong>Privacy Policy</strong>
          <span>How the app handles data (short version: it doesn't leave your device).</span>
        </a>
      </li>
      <li>
        <a class="card" href="store-listing.html">
          <strong>Store Listing</strong>
          <span>App description and store metadata.</span>
        </a>
      </li>
    </ul>
    <footer>
      Source on <a href="https://github.com/reaglin/AppOpenerAndTimer">GitHub</a>.
    </footer>
  </main>
</body>
</html>
